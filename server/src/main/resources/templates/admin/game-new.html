<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
  <title>게임 등록 - GamePaper Admin</title>
</head>
<body>
<main>
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <!-- 에러 메시지 -->
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0"><i class="bi bi-plus-circle me-2"></i>게임 등록</h6>
        </div>
        <div class="card-body">
          <!-- 등록 폼 -->
          <form id="gameForm" th:action="@{/admin/games/new}" method="post">
            <!-- 숨겨진 게임 ID 필드 (저장 후 채워짐) -->
            <input type="hidden" id="savedGameId" name="savedGameId" value="">

            <div class="mb-3">
              <label for="gameName" class="form-label fw-semibold">게임명 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="gameName" name="name"
                     placeholder="예: 원신, 메이플스토리" required>
            </div>
            <div class="mb-3">
              <label for="gameUrl" class="form-label fw-semibold">배경화면 페이지 URL <span class="text-danger">*</span></label>
              <input type="url" class="form-control" id="gameUrl" name="url"
                     placeholder="https://example.com/wallpapers" required>
              <div class="form-text">게임 공식 사이트의 배경화면 다운로드 페이지 URL을 입력하세요.</div>
            </div>

            <!-- AI 분석 섹션 -->
            <hr>
            <div class="mb-3">
              <label class="form-label fw-semibold">AI 파싱 전략 분석 <span class="badge bg-secondary">선택</span></label>

              <!-- AI 분석 상태 표시 -->
              <div id="analysisStatus" class="alert" style="display:none;"></div>

              <!-- AI 분석 버튼 -->
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary" onclick="startAnalysisWithSave()">
                  <i class="bi bi-robot me-1"></i>AI 분석 시작
                </button>
              </div>
              <div class="form-text">게임명과 URL 입력 후 AI 분석을 실행하면 파싱 전략이 자동 생성됩니다.</div>
            </div>

            <!-- 전략 미리보기 (분석 완료 후 표시) -->
            <div id="strategyPreview" style="display:none;" class="mb-3">
              <label class="form-label fw-semibold">파싱 전략 미리보기</label>
              <textarea id="strategyJson" class="form-control font-monospace" rows="12" readonly
                        style="font-size: 0.85rem;"></textarea>
              <!-- 수동 수정 토글 -->
              <button type="button" class="btn btn-sm btn-outline-secondary mt-2"
                      onclick="document.getElementById('strategyJson').removeAttribute('readonly')">
                수동 수정
              </button>
              <div class="form-text text-success mt-1">
                <i class="bi bi-check-circle me-1"></i>AI 분석이 완료되었습니다.
              </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary" id="btnSubmit">
                <i class="bi bi-save me-1"></i>저장 (크롤링은 게임 상세 페이지에서 실행)
              </button>
              <a th:href="@{/admin/games}" class="btn btn-outline-secondary">취소</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // AI 분석 polling 로직
    let pollingTimer = null;

    // 1단계: 게임 저장 후 분석 시작
    function startAnalysisWithSave() {
      const name = document.getElementById('gameName').value.trim();
      const url = document.getElementById('gameUrl').value.trim();

      if (!name || !url) {
        showStatus('게임명과 URL을 모두 입력해주세요.', 'error');
        return;
      }

      showStatus('게임 정보 저장 중...', 'info');

      // 게임 먼저 저장
      fetch('/admin/games/new', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&analyzeOnly=true`
      })
      .then(response => response.json())
      .then(data => {
        if (data.gameId) {
          document.getElementById('savedGameId').value = data.gameId;
          startPolling(data.gameId);
        } else {
          showStatus('게임 저장 실패: ' + (data.error || '알 수 없는 오류'), 'error');
        }
      })
      .catch(err => showStatus('오류: ' + err.message, 'error'));
    }

    // 2단계: 분석 시작 + polling
    function startPolling(gameId) {
      showStatus('AI 분석 시작 중...', 'info');

      fetch(`/admin/games/${gameId}/analyze`, {method: 'POST'})
      .then(() => {
        showStatus('AI가 파싱 전략을 생성하고 있습니다... (최대 60초)', 'info');
        pollingTimer = setInterval(() => checkStatus(gameId), 2000);
      })
      .catch(err => showStatus('분석 시작 실패: ' + err.message, 'error'));
    }

    // 상태 polling
    function checkStatus(gameId) {
      fetch(`/admin/games/${gameId}/analyze/status`)
      .then(response => response.json())
      .then(data => {
        if (data.status === 'COMPLETED') {
          clearInterval(pollingTimer);
          showStatus('전략 생성 완료!', 'success');
          showStrategyPreview(data.strategy);
        } else if (data.status === 'FAILED') {
          clearInterval(pollingTimer);
          showStatus('분석 실패: ' + data.error, 'error');
        } else {
          showStatus(data.message || 'AI 분석 중...', 'info');
        }
      })
      .catch(err => {
        clearInterval(pollingTimer);
        showStatus('상태 확인 실패: ' + err.message, 'error');
      });
    }

    function showStatus(message, type) {
      const el = document.getElementById('analysisStatus');
      el.textContent = message;
      el.className = 'alert alert-' +
          (type === 'error' ? 'danger' : type === 'success' ? 'success' : 'info');
      el.style.display = 'block';
    }

    function showStrategyPreview(strategyJson) {
      const preview = document.getElementById('strategyPreview');
      const textarea = document.getElementById('strategyJson');
      try {
        const parsed = typeof strategyJson === 'string'
            ? JSON.parse(strategyJson) : strategyJson;
        textarea.value = JSON.stringify(parsed, null, 2);
      } catch(e) {
        textarea.value = typeof strategyJson === 'string'
            ? strategyJson : JSON.stringify(strategyJson, null, 2);
      }
      preview.style.display = 'block';
    }
  </script>
</main>
</body>
</html>
