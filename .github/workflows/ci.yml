name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 의존성 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('server/**/*.gradle*', 'server/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x server/gradlew

      - name: 빌드 및 테스트 (JaCoCo 커버리지 포함)
        run: |
          cd server
          ./gradlew test --no-daemon --continue; TEST_EXIT=$?
          ./gradlew jacocoTestReport --no-daemon || true
          ./gradlew jacocoTestCoverageVerification --no-daemon && VERIFY_RESULT="PASS" || VERIFY_RESULT="FAIL"
          echo "COVERAGE_GATE=${VERIFY_RESULT}" >> $GITHUB_ENV
          exit $TEST_EXIT

      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: server/build/reports/tests/
          retention-days: 30

      - name: JaCoCo 커버리지 리포트 업로드 (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: server/build/reports/jacoco/test/html/
          retention-days: 30

      - name: JaCoCo 커버리지 리포트 업로드 (XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-xml
          path: server/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 30

      - name: 커버리지 요약 출력
        if: always()
        run: |
          REPORT=server/build/reports/jacoco/test/jacocoTestReport.xml
          if [ -f "$REPORT" ]; then
            read MISSED COVERED <<< $(awk -F'"' '/type="INSTRUCTION"/{for(i=1;i<=NF;i++){if($i=="missed"){m+=$(i+1)}if($i=="covered"){c+=$(i+1)}}} END{print m" "c}' "$REPORT")
            TOTAL=$((MISSED + COVERED))
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(awk "BEGIN {printf \"%.1f\", ${COVERED} * 100 / ${TOTAL}}")
              TEST_COUNT=$(find server/src/test -name "*.java" -exec grep -l "@Test" {} \; | xargs grep -h "@Test" | wc -l)
              echo "### 테스트 커버리지 요약" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| 지표 | 값 |" >> $GITHUB_STEP_SUMMARY
              echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
              echo "| 테스트 메서드 수 | ${TEST_COUNT} |" >> $GITHUB_STEP_SUMMARY
              echo "| 커버된 명령어 | ${COVERED} / ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
              echo "| 명령어 커버리지 | **${PCT}%** |" >> $GITHUB_STEP_SUMMARY
              echo "| 최소 기준 | 50% |" >> $GITHUB_STEP_SUMMARY
              echo "| 커버리지 게이트 | **${COVERAGE_GATE:-N/A}** |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> 상세 리포트: Actions > Artifacts > coverage-report" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### 테스트 커버리지" >> $GITHUB_STEP_SUMMARY
            echo "> JaCoCo XML 리포트를 찾을 수 없습니다." >> $GITHUB_STEP_SUMMARY
          fi

  docker-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 메타데이터 설정
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gamepaper-server
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Docker 이미지 빌드 및 GHCR 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 빌드 결과 요약
        run: |
          echo "### Docker 이미지 빌드 및 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 레지스트리 | ghcr.io |" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 | ghcr.io/${{ github.repository_owner }}/gamepaper-server |" >> $GITHUB_STEP_SUMMARY
          echo "| 태그 | latest, sha-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 브랜치 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
