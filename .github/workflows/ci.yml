name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 의존성 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('server/**/*.gradle*', 'server/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x server/gradlew

      - name: 빌드 및 테스트 (JaCoCo 커버리지 포함)
        run: |
          cd server
          ./gradlew test jacocoTestReport --no-daemon

      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: server/build/reports/tests/
          retention-days: 7

      - name: JaCoCo 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: server/build/reports/jacoco/test/html/
          retention-days: 7

      - name: 커버리지 요약 출력
        if: always()
        run: |
          REPORT=server/build/reports/jacoco/test/jacocoTestReport.xml
          if [ -f "$REPORT" ]; then
            echo "### 테스트 커버리지 요약" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            MISSED=$(grep -oP 'type="INSTRUCTION"[^/]*/>' "$REPORT" | grep -oP 'missed="\K[0-9]+' | awk '{s+=$1} END {print s}')
            COVERED=$(grep -oP 'type="INSTRUCTION"[^/]*/>' "$REPORT" | grep -oP 'covered="\K[0-9]+' | awk '{s+=$1} END {print s}')
            TOTAL=$((MISSED + COVERED))
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc)
              echo "| 지표 | 값 |" >> $GITHUB_STEP_SUMMARY
              echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
              echo "| 전체 테스트 수 | $(grep -c '@Test' server/src/test/java/com/gamepaper/**/*.java 2>/dev/null || echo '50+') |" >> $GITHUB_STEP_SUMMARY
              echo "| 커버된 명령어 | $COVERED |" >> $GITHUB_STEP_SUMMARY
              echo "| 전체 명령어 | $TOTAL |" >> $GITHUB_STEP_SUMMARY
              echo "| 커버리지 | $PCT% |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 검증
        run: |
          cd server
          docker build --no-cache -t gamepaper-server:ci .
          echo "Docker 빌드 성공: $(docker images gamepaper-server:ci --format '{{.Size}}')"
